<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>善財童子五十三參．抽籤 — 寶嚴禪寺</title>
<style>
  :root{
    --red:#7a1416; --red-deep:#5a0d0f; --red-light:#9c2a2c;
    --gold:#c9a227; --gold-light:#e8cf7a; --gold-deep:#9c7a14;
    --paper:#f7f0e1; --paper-line:#e7dcc2;
    --ink:#2b211a; --ink-soft:#5c4d3d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif TC","Songti TC","STSong","PMingLiU",serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 50% -10%, #93292b 0%, var(--red) 38%, var(--red-deep) 100%);
    min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 48px;
    position:relative; overflow-x:hidden;
  }
  /* 飄落的金色光點裝飾 */
  .bg-orbs{position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;}
  .bg-orbs span{
    position:absolute; bottom:-20px; width:8px; height:8px; border-radius:50%;
    background:radial-gradient(circle,var(--gold-light),transparent 70%);
    opacity:.5; animation:rise linear infinite;
  }
  @keyframes rise{
    to{transform:translateY(-110vh) translateX(30px); opacity:0;}
  }

  .wrap{width:100%; max-width:560px; position:relative; z-index:1; text-align:center;}

  header{margin-bottom:6px;}
  .temple{
    color:var(--gold-light); letter-spacing:.5em; font-size:15px;
    text-indent:.5em; margin-bottom:14px;
  }
  h1{
    color:var(--paper); font-size:30px; font-weight:700; line-height:1.5;
    text-shadow:0 2px 10px rgba(0,0,0,.4);
  }
  h1 .sm{display:block; font-size:16px; color:var(--gold-light); letter-spacing:.3em; margin-top:8px; font-weight:400;}
  .subtitle{color:#f3dca0; opacity:.85; font-size:14px; margin-top:14px; line-height:1.8;}

  /* 籤筒 */
  .stage{margin:30px auto 8px; min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .tube-area{display:flex; flex-direction:column; align-items:center;}
  .tube{
    width:120px; height:190px; position:relative; cursor:pointer;
    filter:drop-shadow(0 12px 22px rgba(0,0,0,.45));
    transition:transform .2s;
  }
  .tube:active{transform:scale(.97);}
  .tube .body{
    position:absolute; bottom:0; width:120px; height:160px;
    background:linear-gradient(90deg,#6a0f11,#a83133 45%,#c0494b 52%,#a83133 60%,#6a0f11);
    border-radius:10px 10px 14px 14px;
    border:2px solid var(--gold-deep);
    box-shadow:inset 0 0 18px rgba(0,0,0,.5);
  }
  .tube .rim{
    position:absolute; top:18px; width:120px; height:26px;
    background:linear-gradient(90deg,#8a6a10,var(--gold) 50%,#8a6a10);
    border-radius:50%/60%; border:2px solid var(--gold-light);
  }
  .tube .label{
    position:absolute; bottom:30px; left:0; right:0; text-align:center;
    color:var(--gold-light); font-size:34px; font-weight:700; letter-spacing:.1em;
    text-shadow:0 1px 4px rgba(0,0,0,.6); line-height:1.1;
    writing-mode:vertical-rl;
    display:flex; justify-content:center; width:100%;
  }
  /* 露出的籤枝 */
  .sticks{position:absolute; top:-30px; left:0; right:0; height:44px; display:flex; justify-content:center; gap:5px;}
  .sticks i{display:block; width:5px; height:42px; background:linear-gradient(#f3e6c4,#d8c187); border-radius:3px; transform-origin:bottom center;}
  .sticks i:nth-child(1){height:36px; transform:rotate(-9deg);}
  .sticks i:nth-child(2){height:44px; transform:rotate(-3deg);}
  .sticks i:nth-child(3){height:40px;}
  .sticks i:nth-child(4){height:46px; transform:rotate(4deg);}
  .sticks i:nth-child(5){height:38px; transform:rotate(9deg);}

  .tube.shaking{animation:shake .5s ease-in-out infinite;}
  @keyframes shake{
    0%,100%{transform:rotate(-7deg) translateY(0);}
    25%{transform:rotate(6deg) translateY(-6px);}
    50%{transform:rotate(-6deg) translateY(0);}
    75%{transform:rotate(7deg) translateY(-5px);}
  }
  .tube.shaking .sticks i{animation:rattle .25s ease-in-out infinite alternate;}
  @keyframes rattle{from{transform:translateY(0) rotate(0);} to{transform:translateY(-6px) rotate(6deg);}}

  .hint{color:var(--gold-light); margin-top:22px; font-size:15px; letter-spacing:.15em; opacity:.9;}
  .hint.blink{animation:blink 1.6s ease-in-out infinite;}
  @keyframes blink{50%{opacity:.35;}}

  /* 主按鈕 */
  .btn{
    appearance:none; border:none; cursor:pointer; font-family:inherit;
    background:linear-gradient(180deg,var(--gold-light),var(--gold) 55%,var(--gold-deep));
    color:#4a2c08; font-weight:700; font-size:18px; letter-spacing:.25em; text-indent:.25em;
    padding:14px 40px; border-radius:40px; margin-top:24px;
    box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 #fff6d8;
    transition:transform .15s, box-shadow .15s; border:1.5px solid #fff2cf;
  }
  .btn:hover{transform:translateY(-2px); box-shadow:0 9px 22px rgba(0,0,0,.4), inset 0 1px 0 #fff6d8;}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.5; cursor:default; transform:none;}
  .btn.ghost{
    background:transparent; color:var(--gold-light); border:1.5px solid var(--gold);
    box-shadow:none; font-size:15px; padding:11px 30px;
  }
  .btn.ghost:hover{background:rgba(201,162,39,.12); transform:translateY(-1px);}
  .actions{display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}

  /* 籤卡 */
  .card-scene{perspective:1400px; width:100%; max-width:440px; margin:6px auto 0; display:none;}
  .card-scene.show{display:block;}
  .card{
    position:relative; width:100%; border-radius:16px;
    background:
      linear-gradient(180deg,#fffaf0,var(--paper));
    border:2px solid var(--gold);
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 0 0 6px rgba(201,162,39,.12);
    padding:26px 26px 30px;
    text-align:center;
    transform:rotateY(0) translateY(0);
    animation:cardIn .7s cubic-bezier(.2,.9,.25,1.2);
  }
  @keyframes cardIn{
    0%{opacity:0; transform:rotateY(90deg) translateY(20px) scale(.9);}
    100%{opacity:1; transform:rotateY(0) translateY(0) scale(1);}
  }
  .card::before{
    content:""; position:absolute; inset:8px; border:1px solid var(--paper-line);
    border-radius:10px; pointer-events:none;
  }
  .luck{
    display:inline-block; background:var(--red); color:var(--gold-light);
    font-size:14px; letter-spacing:.3em; text-indent:.3em; padding:5px 18px;
    border-radius:20px; border:1px solid var(--gold); margin-bottom:6px;
  }
  .no{color:var(--ink-soft); font-size:14px; letter-spacing:.2em; margin:10px 0 2px;}
  .no b{color:var(--red); font-size:17px;}
  .portrait{
    width:118px; height:118px; margin:10px auto 6px; border-radius:50%;
    background:radial-gradient(circle at 50% 35%,#fff,#f0e6cf 70%,#e3d3aa);
    border:2px solid var(--gold); display:flex; align-items:center; justify-content:center;
    overflow:hidden; box-shadow:0 4px 12px rgba(0,0,0,.18);
  }
  .portrait img{width:100%; height:100%; object-fit:cover; display:none;}
  .portrait svg{width:78px; height:78px;}
  .name{font-size:28px; font-weight:700; color:var(--red-deep); margin-top:4px; letter-spacing:.05em;}
  .role{font-size:15px; color:var(--ink-soft); margin-top:6px;}
  .meta{
    margin:16px auto 4px; max-width:340px; text-align:left;
    border-top:1px dashed var(--paper-line); padding-top:14px;
  }
  .meta .row{display:flex; gap:10px; font-size:14.5px; margin-bottom:8px; line-height:1.7;}
  .meta .row .k{color:var(--gold-deep); font-weight:700; flex:0 0 70px; letter-spacing:.1em;}
  .meta .row .v{color:var(--ink); flex:1;}
  .verse{
    margin-top:14px; background:rgba(201,162,39,.10); border:1px solid var(--paper-line);
    border-radius:10px; padding:16px 18px; font-size:16px; line-height:2; color:var(--ink);
    position:relative;
  }
  .verse .vt{color:var(--red); font-weight:700; letter-spacing:.2em; font-size:14px; display:block; margin-bottom:6px;}

  footer{margin-top:34px; color:#f0d89e; opacity:.6; font-size:12px; line-height:1.9; text-align:center; max-width:480px;}
  footer a{color:var(--gold-light);}

  @media(max-width:480px){
    h1{font-size:25px;} .tube{transform:scale(.95);} .name{font-size:24px;}
  }
</style>
</head>
<body>
<div class="bg-orbs" id="orbs"></div>

<div class="wrap">
  <header>
    <div class="temple">寶 嚴 禪 寺</div>
    <h1>善財童子五十三參
      <span class="sm">虔 心 求 籤 ． 善 知 識 指 路</span>
    </h1>
    <p class="subtitle">
      善財童子歷訪五十三位善知識，遍學菩薩大行。<br>
      請您先合掌靜心、默想所求之事，再點選籤筒求取一籤。
    </p>
  </header>

  <div class="stage" id="stage">
    <div class="tube-area" id="tubeArea">
      <div class="tube" id="tube" title="點我搖籤">
        <div class="sticks"><i></i><i></i><i></i><i></i><i></i></div>
        <div class="body"></div>
        <div class="rim"></div>
        <div class="label">籤</div>
      </div>
      <div class="hint blink" id="hint">點選籤筒，誠心求籤</div>
    </div>

    <div class="card-scene" id="scene"></div>
  </div>

  <div class="actions">
    <button class="btn" id="drawBtn">求　籤</button>
    <button class="btn ghost" id="againBtn" style="display:none;">再求一籤</button>
  </div>

  <footer>
    籤文依《大方廣佛華嚴經‧入法界品》五十三參編成，現代啟示為勸善方便語，僅供省思祈福之用。<br>
    © 寶嚴禪寺　Baoyan Chan Monastery
  </footer>
</div>

/* ============ 圖片設定（之後掛 Drive 畫作）============
   把每一參的圖片放到 images/01.jpg ~ images/53.jpg 即可自動顯示，
   找不到圖片時會優雅地改用蓮花圖示。 */
const IMG_DIR = "images/";              // 圖片資料夾
const IMG_EXT = ".jpg";                  // 副檔名
function imgPath(n){ return IMG_DIR + String(n).padStart(2,"0") + IMG_EXT; }

/* 蓮花預設圖示 */
const LOTUS = `<svg viewBox="0 0 64 64" fill="none" stroke="#9c2a2c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M32 14c4 6 4 12 0 20-4-8-4-14 0-20z"/>
  <path d="M32 34c6-3 12-2 18 2-6 6-13 7-18 3"/>
  <path d="M32 34c-6-3-12-2-18 2 6 6 13 7 18 3"/>
  <path d="M32 34c3-5 8-8 15-8 0 7-4 13-11 15"/>
  <path d="M32 34c-3-5-8-8-15-8 0 7 4 13 11 15"/>
  <path d="M16 40c5 8 13 12 16 12s11-4 16-12"/>
</svg>`;

/* ============ 互動邏輯 ============ */
const tube   = document.getElementById("tube");
const tubeArea = document.getElementById("tubeArea");
const scene  = document.getElementById("scene");
const drawBtn= document.getElementById("drawBtn");
const againBtn=document.getElementById("againBtn");
const hint   = document.getElementById("hint");
let busy = false;

function draw(){
  if(busy) return;
  busy = true;
  scene.classList.remove("show");
  scene.innerHTML = "";
  tubeArea.style.display = "flex";
  hint.textContent = "籤筒搖動中…誠心默想";
  hint.classList.remove("blink");
  tube.classList.add("shaking");
  drawBtn.disabled = true;
  againBtn.style.display = "none";

  setTimeout(()=>{
    tube.classList.remove("shaking");
    const pick = SIGNS[Math.floor(Math.random()*SIGNS.length)];
    showCard(pick);
    tubeArea.style.display = "none";
    drawBtn.style.display = "none";
    againBtn.style.display = "inline-block";
    drawBtn.disabled = false;
    busy = false;
  }, 1600);
}

function showCard(s){
  scene.innerHTML = `
    <div class="card">
      <div class="luck">${s.luck}</div>
      <div class="no">第 <b>${s.n}</b> 參　／　共五十三參</div>
      <div class="portrait">
        <img id="cardImg" alt="${s.name}">
        <span id="lotusBox">${LOTUS}</span>
      </div>
      <div class="name">${s.name}</div>
      <div class="role">參訪：${s.role}</div>
      <div class="meta">
        <div class="row"><span class="k">所授法門</span><span class="v">${s.gate}</span></div>
      </div>
      <div class="verse">
        <span class="vt">善知識開示</span>
        ${s.msg}
      </div>
    </div>`;
  scene.classList.add("show");

  // 嘗試載入該參畫作；失敗則維持蓮花圖示
  const img = document.getElementById("cardImg");
  const lotus = document.getElementById("lotusBox");
  img.onload  = ()=>{ img.style.display="block"; lotus.style.display="none"; };
  img.onerror = ()=>{ img.style.display="none"; lotus.style.display="flex"; };
  img.src = imgPath(s.n);
}

tube.addEventListener("click", draw);
drawBtn.addEventListener("click", draw);
againBtn.addEventListener("click", draw);

/* 背景金色光點 */
(function(){
  const box = document.getElementById("orbs");
  for(let i=0;i<18;i++){
    const s=document.createElement("span");
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(6+Math.random()*8)+"s";
    s.style.animationDelay=(Math.random()*8)+"s";
    const sz=4+Math.random()*8; s.style.width=s.style.height=sz+"px";
    box.appendChild(s);
  }
})();
</script>
